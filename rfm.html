<h1>👥 用户分层分析（RFM模型）</h1>

<h2>📌 模型说明</h2>

<ul>
    <li>R（Recency）：最近一次行为时间</li>
    <li>F（Frequency）：行为频率</li>
    <img src="images/rfm.png" width="650">
</ul>

<p>
通过RFM模型可以看出平台存在持续访问行为，而不是只在某个时间点爆发。Recency分布跨度大，同时存在高活跃用户与潜在流失用户
绝大部分用户 Frequency = 1，说明用户粘性整体偏低
</p>
